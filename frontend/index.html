<!DOCTYPE html>
<html>
<head>
    <title>AI SQL Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
        }

        .container {
            max-width: 900px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.05);
        }

        .header p {
            color: #94a3b8;
        }

        /* 🔥 FILE UPLOAD BAR */
        .upload-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
        }

        .upload-box input {
            padding: 8px;
            background: #1e293b;
            border: none;
            border-radius: 10px;
            color: white;
        }

        .upload-box button {
            padding: 8px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #3b82f6;
            color: white;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            max-width: 70%;
            padding: 14px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .user {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            align-self: flex-end;
        }

        .bot {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            align-self: flex-start;
        }

        .input-box {
            display: flex;
            padding: 10px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
        }

        input#input {
            flex: 1;
            padding: 14px;
            border-radius: 25px;
            border: none;
            outline: none;
            background: #1e293b;
            color: white;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
        }

        .mic { background: #ef4444; color: white; }
        .send { background: #22c55e; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        th {
            background: #334155;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🤖 AI SQL Assistant</h1>
        <p>Upload file & ask anything in natural language</p>
    </div>

    <!-- 🔥 FILE UPLOAD -->
    <div class="upload-box">
        <input type="file" id="fileUpload">
        <button onclick="uploadFile()">Upload</button>
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-box">
        <input id="input" placeholder="Ask something..." />
        <button class="mic" onclick="startVoice()">🎤</button>
        <button class="send" onclick="sendQuery()">Send</button>
    </div>

</div>

<script>

let pendingDelete = false;

// 🔹 Add message
function addMessage(text, type) {
    let chat = document.getElementById("chat");

    let msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerHTML = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

// 🔹 Upload file
async function uploadFile() {
    let file = document.getElementById("fileUpload").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    addMessage("📁 Uploading file...", "bot");

    let res = await fetch("http://127.0.0.1:8000/upload", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    addMessage("✅ " + data.message, "bot");
}

// 🔹 Send query
async function sendQuery() {
    let inputBox = document.getElementById("input");
    let userInput = inputBox.value.toLowerCase();

    if (!userInput) return;

    addMessage(userInput, "user");
    inputBox.value = "";

    // 🔐 Confirm delete
    if (pendingDelete) {
        if (userInput === "yes") {
            pendingDelete = false;
            userInput = "delete from uploaded_data";
        } else {
            pendingDelete = false;
            addMessage("❌ Delete cancelled", "bot");
            return;
        }
    }

    if (userInput.includes("delete")) {
        pendingDelete = true;
        addMessage("⚠️ Are you sure? Type YES to confirm delete", "bot");
        return;
    }

    addMessage("⏳ Thinking...", "bot");

    let response = await fetch("http://127.0.0.1:8000/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: userInput })
    });

    let data = await response.json();

    let botMessage = `<b>SQL:</b><br>${data.sql}<br><br>`;

    if (data.result.type === "select") {
        botMessage += renderTable(data.result.data, data.result.columns);
    } 
    else if (data.result.type === "action") {
        botMessage += `✅ ${data.result.rows} row(s) affected`;
    } 
    else {
        botMessage += `❌ Error: ${data.result.message}`;
    }

    addMessage(botMessage, "bot");
}

// 🔹 Table render
function renderTable(data, columns) {
    if (!data || data.length === 0) {
        return "<p style='color:#f87171;'>⚠️ No data found</p>";
    }

    let html = "<table>";

    html += "<tr>";
    columns.forEach(col => {
        html += `<th>${col}</th>`;
    });
    html += "</tr>";

    data.forEach(row => {
        html += "<tr>";
        row.forEach(cell => {
            html += `<td>${cell}</td>`;
        });
        html += "</tr>";
    });

    html += "</table>";
    return html;
}

// 🔹 Voice
function startVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Use Chrome browser");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript;
        document.getElementById("input").value = text;
        sendQuery();
    };

    recognition.onerror = function(event) {
        alert("Voice error: " + event.error);
    };
}

</script>

</body>
</html>
