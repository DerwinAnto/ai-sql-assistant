<!DOCTYPE html>
<html>
<head>
    <title>AI SQL Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
        }

        .container {
            max-width: 950px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
        }

        .header h1 {
            margin: 0;
        }

        .header p {
            color: #94a3b8;
            margin-top: 5px;
        }

        /* 🔥 Upload bar */
        .upload-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        .upload-box input {
            padding: 8px;
            background: #1e293b;
            border: none;
            border-radius: 10px;
            color: white;
        }

        .upload-box button {
            padding: 8px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #3b82f6;
            color: white;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            max-width: 75%;
            padding: 14px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            align-self: flex-end;
        }

        .bot {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            align-self: flex-start;
        }

        .input-box {
            display: flex;
            padding: 10px;
            margin-bottom: 20px;
        }

        input#input {
            flex: 1;
            padding: 14px;
            border-radius: 25px;
            border: none;
            outline: none;
            background: #1e293b;
            color: white;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
        }

        .mic { background: #ef4444; }
        .send { background: #22c55e; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        th {
            background: #334155;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🤖 AI SQL Assistant</h1>
        <p>Upload CSV & ask in natural language</p>
    </div>

    <!-- 🔥 Upload -->
    <div class="upload-box">
        <input type="file" id="fileUpload">
        <button onclick="uploadFile()">Upload</button>
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-box">
        <input id="input" placeholder="Ask something..." />
        <button class="mic" onclick="startVoice()">🎤</button>
        <button class="send" onclick="sendQuery()">Send</button>
    </div>

</div>

<script>

let pendingDelete = false;
let lastQuery = "";

// 🔹 Add message
function addMessage(text, type) {
    let chat = document.getElementById("chat");

    let msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerHTML = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

// 🔥 MAIN LOGIC (FIXED)
async function sendQuery() {
    let inputBox = document.getElementById("input");
    let userInput = inputBox.value.trim().toLowerCase();

    if (!userInput) return;

    addMessage(userInput, "user");
    inputBox.value = "";

    // ✅ STEP 1: confirmation handling
    if (pendingDelete) {
        if (userInput === "yes") {
            pendingDelete = false;

            await executeQuery(lastQuery);
            lastQuery = "";
            return;
        } else {
            pendingDelete = false;
            lastQuery = "";
            addMessage("❌ Delete cancelled", "bot");
            return;
        }
    }

    // ✅ STEP 2: detect dangerous commands
    if (userInput.includes("delete") || userInput.includes("drop")) {
        pendingDelete = true;
        lastQuery = userInput;

        addMessage("⚠️ Are you sure? Type YES to confirm", "bot");
        return;
    }

    await executeQuery(userInput);
}

// 🔹 Execute API
async function executeQuery(query) {
    try {
        addMessage("⏳ Thinking...", "bot");

        let response = await fetch("http://127.0.0.1:8000/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: query })
        });

        let data = await response.json();

        let botMessage = `<b>SQL:</b><br>${data.sql}<br><br>`;

        if (!data.result) {
            botMessage += "❌ No response from server";
        }
        else if (data.result.type === "select") {
            botMessage += renderTable(data.result.data || [], data.result.columns || []);
        }
        else if (data.result.type === "action") {
            botMessage += `✅ ${data.result.rows || 0} row(s) affected`;
        }
        else {
            botMessage += `❌ ${data.result.message || "Error"}`;
        }

        addMessage(botMessage, "bot");

    } catch (error) {
        addMessage("❌ Something went wrong (UI crash fixed)", "bot");
        console.error(error);
    }
}
// 🔹 Table
function renderTable(data, columns) {
    if (!data || data.length === 0) {
        return "<p style='color:#f87171;'>⚠️ No data found</p>";
    }

    let html = "<table>";

    html += "<tr>";
    columns.forEach(col => {
        html += `<th>${col}</th>`;
    });
    html += "</tr>";

    data.forEach(row => {
        html += "<tr>";
        row.forEach(cell => {
            html += `<td>${cell}</td>`;
        });
        html += "</tr>";
    });

    html += "</table>";
    return html;
}

// 🔹 Upload CSV
async function uploadFile() {
    let fileInput = document.getElementById("fileUpload");

    if (!fileInput.files.length) {
        alert("Select a file first");
        return;
    }

    let formData = new FormData();
    formData.append("file", fileInput.files[0]);

    addMessage("📤 Uploading file...", "bot");

    let response = await fetch("http://127.0.0.1:8000/upload", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    addMessage("✅ File uploaded successfully", "bot");
}

// 🔹 Voice
function startVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Use Chrome browser");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript;
        document.getElementById("input").value = text;
        sendQuery();
    };

    recognition.onerror = function(event) {
        alert("Voice error: " + event.error);
    };
}

</script>

</body>
</html>
